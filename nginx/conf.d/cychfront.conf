server {
    listen 80;
    server_name cychfrontdev.riyardigital.com;

    # 強制跳轉 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl; 
    http2 on;
    server_name cychfrontdev.riyardigital.com;

    # SSL 憑證
    ssl_certificate /etc/letsencrypt/live/cychfrontdev.riyardigital.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cychfrontdev.riyardigital.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 正式環境：直接讀取 Dockerfile COPY 進來的靜態檔案
    root /usr/share/nginx/html;
    index index.html;

    # [新增] API 反向代理規則
    location /api/ {
        # 將打到前端 /api/ 的請求，由 Nginx 轉發給後端
        proxy_pass https://cychbackdev.riyardigital.com/api/;
        
        # 解決 HTTPS 轉發的 SNI 問題 (非常重要，沒加可能會 502/504)
        proxy_ssl_server_name on; 
        proxy_set_header Host cychbackdev.riyardigital.com;

        # 傳遞真實 IP 資訊 (供後端紀錄，但防火牆端看的是 Nginx 實體 IP)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


    location / {
        # SPA 設定：找不到檔案時回到 index.html
        try_files $uri $uri/ /index.html;
    }
}